# Ruff configuration for Python code quality
# https://docs.astral.sh/ruff/

target-version = "py38"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "N806",   # variable in function should be lowercase (conflicts with C++ style)
    "N803",   # argument name should be lowercase (conflicts with C++ style)
    "N802",   # function name should be lowercase (conflicts with C++ style)
]

[format]
quote-style = "double"
indent-style = "space"

[per-file-ignores]
"python/tests/*.py" = ["S101"]  # allow assert in tests
