# Samurai Python Bindings CI - Standalone Build
#
# This workflow tests the Python bindings using the new standalone build system.
# The C++ library must be built and installed first, then the Python bindings
# are built separately using pip or conda.

name: Python Bindings CI (Standalone)

on:
    pull_request:
        branches: [master, main, pybind11]
        paths:
            - 'python/**'
            - '.github/workflows/python-ci.yml'
    push:
        branches: [pybind11]
    workflow_dispatch:

# Cancel previous runs for the same branch
concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    #
    # Python code quality checks (fast)
    #
    #########################################################
    python-quality:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
                  cache: 'pip'

            - name: Install Python dev tools
              run: |
                  pip install ruff mypy black isort

            - name: Run ruff linter
              working-directory: python
              run: |
                  ruff check . --output-format=github

            - name: Run mypy type checker
              working-directory: python
              run: |
                  mypy src/samurai_python/ --show-error-codes || true

    #
    # Build and test Python bindings (using pip)
    #
    #########################################################
    python-bindings-pip:
        needs: [python-quality]
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest]
                python: ['3.9', '3.10', '3.11', '3.12']

        steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python }}

            - name: Cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/ccache
                      ~/.cache/pip
                  key: python-${{ runner.os }}-${{ matrix.python }}

            - name: Install system dependencies
              run: |
                  sudo apt update
                  sudo apt install -y ccache cmake ninja-build

            - name: Install build dependencies
              run: |
                  pip install cmake ninja pybind11 scikit-build-core numpy pytest h5py

            - name: Build and install Samurai C++ library
              run: |
                  cmake -B build \
                      -GNinja \
                      -DCMAKE_BUILD_TYPE=Release \
                      -DBUILD_TESTS=OFF \
                      -DBUILD_DEMOS=OFF
                  cmake --build build --parallel
                  sudo cmake --install build --prefix /usr/local

            - name: Build Python bindings
              working-directory: python
              run: |
                  python -m pip install . --no-build-isolation -v

            - name: Test Python import
              run: |
                  python -c "import sys; print(f'Python {sys.version}')"
                  python -c "import numpy; print(f'NumPy {numpy.__version__}')"
                  python -c "import samurai_python; print('✓ samurai_python imported successfully')"
                  python -c "print(f'Samurai Python version: {samurai_python.__version__}')"

            - name: Run pytest tests
              working-directory: python
              run: |
                  pytest tests/ -v --tb=short -x

    #
    # Test with conda build
    #
    #########################################################
    python-bindings-conda:
        needs: [python-quality]
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/ccache
                      ~/micromamba-root/envs/samurai-env
                  key: conda-${{ runner.os }}-py3.12
                  restore-keys: |
                      conda-${{ runner.os }}-py3.12

            - name: Mamba and samurai env installation
              uses: mamba-org/setup-micromamba@v2
              with:
                  environment-file: conda/environment.yml
                  environment-name: samurai-env
                  cache-environment: true
                  create-args: python=3.12 pybind11

            - name: Compiler installation
              shell: bash -el {0}
              run: |
                  sudo apt update
                  sudo apt install -y ccache

            - name: Build and install Samurai C++ library
              shell: bash -el {0}
              run: |
                  cmake -B build \
                      -GNinja \
                      -DCMAKE_BUILD_TYPE=Release \
                      -DBUILD_TESTS=OFF \
                      -DBUILD_DEMOS=OFF
                  cmake --build build --parallel
                  sudo cmake --install build --prefix /usr/local

            - name: Build Python bindings
              shell: bash -el {0}
              working-directory: python
              run: |
                  python dev.py build

            - name: Test Python import
              shell: bash -el {0}
              run: |
                  python -c "import samurai_python; print('✓ samurai_python imported successfully')"

            - name: Run pytest tests
              shell: bash -el {0}
              working-directory: python
              run: |
                  pytest tests/ -v --tb=short -x

    #
    # Debug with Sanitizers (ASAN + UBSAN, allowed to fail)
    #
    #########################################################
    python-bindings-sanitizers:
        needs: [python-quality]
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install system dependencies
              run: |
                  sudo apt update
                  sudo apt install -y ccache cmake ninja-build

            - name: Install build dependencies
              run: |
                  pip install cmake ninja pybind11 scikit-build-core numpy

            - name: Build and install Samurai C++ library with sanitizers
              run: |
                  cmake -B build \
                      -GNinja \
                      -DCMAKE_BUILD_TYPE=Debug \
                      -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g" \
                      -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g" \
                      -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
                      -DCMAKE_MODULE_LINKER_FLAGS="-fsanitize=address,undefined" \
                      -DBUILD_TESTS=OFF \
                      -DBUILD_DEMOS=OFF
                  cmake --build build --parallel
                  sudo cmake --install build --prefix /usr/local

            - name: Build Python bindings
              working-directory: python
              run: |
                  python -m pip install . --no-build-isolation

            - name: Test with sanitizers
              run: |
                  export ASAN_OPTIONS=detect_leaks=0
                  export UBSAN_OPTIONS=print_stacktrace=1
                  python -c "import samurai_python; print('✓ Import OK')"
