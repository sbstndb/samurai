name: samurai-mpi-py314
channels:
  - conda-forge
dependencies:
  # Python - version fixee
  - python=3.14.2

  # Outils de build
  - cmake=4.2.1
  - ninja=1.13.2
  - cxx-compiler=1.11.0

  # Dependences principales Samurai
  - xtensor=0.27.1
  - highfive=3.2.0
  - fmt=12.1.0
  - pugixml=1.15
  - cli11=2.6.0

  # Tests
  - pytest=9.0.2
  - h5py=3.15.1

  # MPI
  - mpich=4.3.2
  - libboost-mpi=1.89.0
  - libboost-devel
  - libboost-headers
  - hdf5=*mpi_*

  # Optionnel: PETSc pour solveurs
  - petsc=3.24.3
  - pkg-config
